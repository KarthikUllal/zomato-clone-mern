<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomato Login Page</title>
    <link rel="stylesheet" href="../static/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div class="container">
        <div class="login-header">
            <h2>Login</h2>
            <i class="fa-solid fa-xmark"></i>
        </div>

        <form>
            <div class="form-controls phone-field">
                <div class="country-code">
                    <span>+91</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <input type="tel" placeholder="Phone number" />
            </div>

            <div class="form-controls">
                <button type="submit" class="btn-otp">Send One Time Password</button>
            </div>

            <div class="break">
                <div class="left-hr">
                    <hr />
                </div>
                <span>or</span>
                <div class="left-hr">
                    <hr />
                </div>
            </div>

            <div class="form-controls">
                <button type="button" class="btn-login">
                    <i class="fa-solid fa-envelope"></i> Continue With Email
                </button>
            </div>

            <div class="form-controls">
                <button type="button" class="btn-login">
                    <i class="fa-brands fa-google"></i> Sign In with Google
                </button>
            </div>

            <div class="break">
                <div class="left-hr">
                    <hr />
                </div>
                <span>or</span>
                <div class="left-hr">
                    <hr />
                </div>
            </div>

            <div class="login-footer">
                <p>New to Zomato? <a href="signup.html">Create Account</a></p>
            </div>
        </form>
    </div>
</body>

</html>
